<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quero Café Bar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  </head>
  <body>
    <ion-app>
        <ion-router id="main-router" use-hash="false">
            <ion-route-redirect from="/" to="/login"></ion-route-redirect>
            
            <ion-route url="/login" component="login-page"></ion-route>
            
            <ion-route url="/home" component="home-page"></ion-route>

            <!--PRODUTO-->
            <ion-route url="/produtos" component="list-produto-page"></ion-route>

            <ion-route url="/produto/register" component="reg-produto-page"></ion-route>
            
            <ion-route url="/produto/edit" component="update-produto-page"></ion-route>

            <!--USUARIO-->
            <ion-route url="/usuarios" component="list-usuario-page"></ion-route>

            <ion-route url="/usuario/register" component="reg-usuario-page"></ion-route>

            <ion-route url="/usuario/edit" component="update-usuario-page"></ion-route>

            <!--MESA-->
            <ion-route url="/mesas" component="list-mesa-page"></ion-route>

            <ion-route url="/mesa/register" component="reg-mesa-page"></ion-route>

            <ion-route url="/mesa/edit" component="update-mesa-page"></ion-route>

            <!--COMANDA-->
            <ion-route url="/comandas" component="list-comanda-page"></ion-route>

            <ion-route url="/comanda/register" component="reg-comanda-page"></ion-route>

            <ion-route url="/comanda/edit" component="update-comanda-page"></ion-route>
            
            <ion-route url="/logout" redirect-to="/login"></ion-route>

            <!--PERFIL-->
            <ion-route url="/profile" component="profile-page"></ion-route>

            <!--CARDÁPIO-->
            <ion-route url="/menu" component="menu-page"></ion-route>

            <!--CONFIGURACOES-->
            <ion-route url="/settings" component="settings-page"></ion-route>
        </ion-router>

        <ion-nav id="main-nav"></ion-nav>
    </ion-app>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
